name: tests

on:
  push:
    branches: [master, "agent/**"]
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements-test.txt
      - run: pytest --cov=analizar_arquitectura --cov=base_vectorial --cov=renderizar_puml --cov=config --cov-report=term-missing
